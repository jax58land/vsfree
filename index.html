// キャンバス

const c = document.getElementById('c');
const ctx = c.getContext('2d');

// =====================================================
// レイアウト（縦横自動切替）
// =====================================================
let W, H, isPortrait;
let PW, CW, ARENA_W, AX, ACX, ACY, ARX, ARY, RP_X, CP_X;
let COMM_Y, COMM_H;
let DPAD_CX, DPAD_CY, DPAD_SZ, DPAD_STEP, DPAD_RECTS;

function setLayout() {
  isPortrait = window.innerHeight > window.innerWidth * 1.05;
  if (isPortrait) {
    W = 390; H = 700;
    PW = 76; CW = 0;
    ARENA_W = W - PW * 2;          // 238
    AX = PW;                        // 76
    ACX = AX + ARENA_W / 2;        // 195
    COMM_Y = 285;
    ACY = COMM_Y / 2;              // 142
    ARX = ARENA_W / 2 - 10;       // 109
    ARY = COMM_Y / 2 - 10;        // 132
    RP_X = PW + ARENA_W;           // 314
    CP_X = 0;
    COMM_H = 120;
    DPAD_CX = W / 2;
    DPAD_CY = COMM_Y + COMM_H + 155; // 560
    DPAD_SZ = 54;
    DPAD_STEP = 64;
  } else {
    W = 1060; H = 590;
    PW = 158; CW = 200;
    ARENA_W = W - PW * 2 - CW;    // 544
    AX = PW;                        // 158
    ACX = AX + ARENA_W / 2;        // 430
    ACY = H / 2;                    // 295
    ARX = ARENA_W / 2 - 20;       // 252
    ARY = H / 2 - 20;             // 275
    RP_X = PW + ARENA_W;           // 702
    CP_X = RP_X + PW;              // 860
    COMM_Y = 0; COMM_H = H;
    DPAD_CX = AX + 72;             // 230
    DPAD_CY = H - 72;              // 518
    DPAD_SZ = 38;
    DPAD_STEP = 42;
  }
  c.width = W; c.height = H;
  DPAD_RECTS = {
    up:    {x: DPAD_CX - DPAD_SZ/2, y: DPAD_CY - DPAD_STEP - DPAD_SZ/2, w: DPAD_SZ, h: DPAD_SZ},
    down:  {x: DPAD_CX - DPAD_SZ/2, y: DPAD_CY + DPAD_STEP - DPAD_SZ/2, w: DPAD_SZ, h: DPAD_SZ},
    left:  {x: DPAD_CX - DPAD_STEP - DPAD_SZ/2, y: DPAD_CY - DPAD_SZ/2, w: DPAD_SZ, h: DPAD_SZ},
    right: {x: DPAD_CX + DPAD_STEP - DPAD_SZ/2, y: DPAD_CY - DPAD_SZ/2, w: DPAD_SZ, h: DPAD_SZ},
  };
}

function resize() {
  const prevPort = isPortrait;
  setLayout();
  const s = Math.min(window.innerWidth / W, window.innerHeight / H, 1.4);
  c.style.width = (W * s) + 'px'; c.style.height = (H * s) + 'px';
  if (prevPort !== undefined && prevPort !== isPortrait && fighters.length > 0) {
    if (phase !== 'battle') {
      initFighters();
    } else {
      fighters.forEach(f => { f.x = ACX + (Math.random() - 0.5) * ARX; f.y = ACY + (Math.random() - 0.5) * ARY; keepInArena(f); });
    }
  }
}
setLayout();
resize();
window.addEventListener('resize', resize);

  Rock:     {Fire:2, Ice:2, Flying:2, Bug:2, Fighting:0.5, Ground:0.5, Steel:0.5},
  Ghost:    {Ghost:2, Psychic:2, Normal:0, Dark:0.5},
  Dragon:   {Dragon:2, Steel:0.5},
  Steel:    {Ice:2, Rock:2, Fire:0.5, Water:0.5, Electric:0.5, Steel:0.5},
};
function calcEff(moveType, defTypes) {
  const chart = TYPE_EFF[moveType] || {};
  let m = 1;
  defTypes.forEach(dt => { if (chart[dt] !== undefined) m *= chart[dt]; });
  return m;
}

let AC = null;
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
const TYPE_SND = {
  Fire:     {freq:280, type:'sawtooth', dur:0.20}, Water:    {freq:360, type:'sine',     dur:0.25},
  Grass:    {freq:300, type:'triangle', dur:0.22}, Electric: {freq:900, type:'square',   dur:0.13},
  Ice:      {freq:560, type:'sine',     dur:0.22}, Normal:   {freq:240, type:'triangle', dur:0.15},
  Fighting: {freq:180, type:'sawtooth', dur:0.14}, Psychic:  {freq:620, type:'sine',     dur:0.28},
  Ghost:    {freq:210, type:'sine',     dur:0.32}, Dragon:   {freq:155, type:'sawtooth', dur:0.28},
  Poison:   {freq:230, type:'sawtooth', dur:0.20}, Ground:   {freq:130, type:'sawtooth', dur:0.24},
  Rock:     {freq:165, type:'sawtooth', dur:0.18}, Flying:   {freq:420, type:'sine',     dur:0.20},
  Bug:      {freq:520, type:'square',   dur:0.14}, Steel:    {freq:720, type:'square',   dur:0.16},
};
function playHit(type, eff) {
  if (!AC) return;
  try {
    const s = TYPE_SND[type] || {freq:320, type:'triangle', dur:0.16};
    const mult = eff >= 2 ? 1.6 : eff <= 0.5 ? 0.65 : 1.0;
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = s.type;
    o.frequency.setValueAtTime(s.freq * mult, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(s.freq * mult * 0.55, AC.currentTime + s.dur);
    g.gain.setValueAtTime(eff >= 2 ? 0.33 : 0.18, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + s.dur);
    o.start(AC.currentTime); o.stop(AC.currentTime + s.dur);
  } catch(e) {}
}
function playKO() {
  if (!AC) return;
  try {
    [520, 410, 310, 190].forEach((freq, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, AC.currentTime + i * 0.13);
      g.gain.setValueAtTime(0.28, AC.currentTime + i * 0.13);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + i * 0.13 + 0.22);
      o.start(AC.currentTime + i * 0.13); o.stop(AC.currentTime + i * 0.13 + 0.24);
    });
  } catch(e) {}
}
function playStart() {
  if (!AC) return;
  try {
    [330, 440, 550, 660].forEach((freq, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(freq, AC.currentTime + i * 0.08);
      g.gain.setValueAtTime(0.15, AC.currentTime + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + i * 0.08 + 0.14);
      o.start(AC.currentTime + i * 0.08); o.stop(AC.currentTime + i * 0.08 + 0.16);
    });
  } catch(e) {}
}

const DPAD_ACTIVE = {up:false, down:false, left:false, right:false};
// DPAD_CX, DPAD_CY, DPAD_SZ, DPAD_STEP, DPAD_RECTS はsetLayout()で設定済み
function inRect(x, y, r) { return x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h; }
function isDpadPos(mx, my) {
  return Object.values(DPAD_RECTS).some(r => inRect(mx, my, r));
}
function updateDpadFromTouches(e) {
  DPAD_ACTIVE.up = false; DPAD_ACTIVE.down = false;
  DPAD_ACTIVE.left = false; DPAD_ACTIVE.right = false;
  const rect = c.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  for (const t of e.touches) {
    const tx = (t.clientX - rect.left) * sx;
    const ty = (t.clientY - rect.top) * sy;
    if (inRect(tx, ty, DPAD_RECTS.up))    DPAD_ACTIVE.up    = true;
    if (inRect(tx, ty, DPAD_RECTS.down))  DPAD_ACTIVE.down  = true;
    if (inRect(tx, ty, DPAD_RECTS.left))  DPAD_ACTIVE.left  = true;
    if (inRect(tx, ty, DPAD_RECTS.right)) DPAD_ACTIVE.right = true;
  }
}

let phase = 'loading';
let fighters = [], activeEffects = [], particles = [], floatingTexts = [];
let betIdx = -1, playerIdx = -1, countdown = 10, bannerTxt = '', cdInt = null, lastTs = 0;

// =====================================================
// ファイター初期化
// =====================================================
function initFighters() {
  activeEffects = []; particles = []; floatingTexts = []; commentary = [];
  betIdx = -1; playerIdx = -1;
  const shuffled = [...ALL_POKEMON].sort(() => Math.random() - 0.5).slice(0, 6);
  fighters = shuffled.map((p, i) => {
    const side = i < 3 ? 0 : 1;
    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
    return {
      ...p, id: i, side,
      x: ACX + Math.cos(angle) * 95,
      y: ACY + Math.sin(angle) * 95,
      vx: 0, vy: 0,
      hp: p.maxHp,
      radius: isPortrait ? 22 : 28,
      alive: true,
      kills: 0,
      damageDealt: 0,
      atkTimer: 0,
      atkCd: Math.max(0.55, 1.7 - p.spd / 120),
      wanderAng: Math.random() * Math.PI * 2,
      wanderT: 0,
      flash: 0,
      atkGlow: 0,
      deathT: 1.0,
      scl: 1.0,
      sclDir: (Math.random() > .5 ? 1 : -1) * 0.003,
      _target: null,
      _targetCd: 0,
    };
  });
}

// =====================================================
// 物理
// =====================================================
function keepInArena(f) {
  const dx = f.x - ACX, dy = f.y - ACY;
  const rx = ARX - f.radius, ry = ARY - f.radius;
  const d = Math.sqrt((dx / rx) ** 2 + (dy / ry) ** 2);
  if (d > 1) {
    const sc = 1 / d;
    f.x = ACX + dx * sc; f.y = ACY + dy * sc;
    const nx = (dx * sc) / rx, ny = (dy * sc) / ry, m = Math.hypot(nx, ny);
    const nnx = nx / m, nny = ny / m, dot = f.vx * nnx + f.vy * nny;
    f.vx = (f.vx - 2 * dot * nnx) * 0.45; f.vy = (f.vy - 2 * dot * nny) * 0.45;
  }
}

// =====================================================
// エフェクト・パーティクル生成
// =====================================================
function spawnEffect(att, tgt, move) {
  const e = { type: move.fx, sx: att.x, sy: att.y, tx: tgt.x, ty: tgt.y, t: 0, dur: move.dur || 0.5 };
  if (move.fx === 'thunderbolt') {
    const segs = 9; e.boltPath = [];
    const startY = tgt.y - 160;
    for (let i = 0; i <= segs; i++) {
      const t = i / segs;
      e.boltPath.push([tgt.x + (i > 0 && i < segs ? (Math.random() - .5) * 38 : 0), startY + (tgt.y - startY) * t]);
    }
  }
  if (move.fx === 'razor_leaf') {
    e.leaves = Array.from({length: 10}, () => ({
      ox: (Math.random() - .5) * 55, oy: (Math.random() - .5) * 55,
      rot: Math.random() * Math.PI * 2, rotSpd: (Math.random() - .5) * 14, sz: 7 + Math.random() * 7,
    }));
  }
  if (move.fx === 'future_sight') e.starAng = Math.random() * Math.PI * 2;
  activeEffects.push(e);
}
function spawnParticles(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 30 + Math.random() * 90;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, col, life: 1.0, sz: 3 + Math.random() * 5 });
  }
}

// =====================================================
// 更新
// =====================================================
function update(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.87; p.vy *= 0.87;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = activeEffects.length - 1; i >= 0; i--) {
    activeEffects[i].t += dt;
    if (activeEffects[i].t >= activeEffects[i].dur) activeEffects.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].life -= dt * 1.8;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  const alive = fighters.filter(f => f.alive);

  fighters.forEach(f => {
    if (!f.alive) { f.deathT = Math.max(0, f.deathT - dt * 1.6); return; }
    f.flash = Math.max(0, f.flash - dt * 10);
    f.atkGlow = Math.max(0, f.atkGlow - dt * 3);
    f.scl += f.sclDir;
    if (f.scl > 1.06 || f.scl < 0.94) f.sclDir *= -1;

    const isPlayer = (f.id === playerIdx && phase === 'battle');

    // AI専用: ウロウロ + ターゲット管理
    if (!isPlayer) {
      f.wanderT += dt;
      if (f.wanderT > (phase === 'battle' ? 0.55 + Math.random() * 0.55 : 1.3 + Math.random() * 0.8)) {
        f.wanderT = 0;
        f.wanderAng += (Math.random() - 0.5) * (phase === 'battle' ? Math.PI * 1.6 : 2.0);
      }
      let nearest = null, nearDist = Infinity;
      alive.forEach(o => {
        if (o === f) return;
        const d = Math.hypot(o.x - f.x, o.y - f.y);
        if (d < nearDist) { nearDist = d; nearest = o; }
      });
      f._targetCd = Math.max(0, f._targetCd - dt);
      if (!f._target || !f._target.alive || f._targetCd <= 0) {
        const opts = alive.filter(o => o !== f);
        if (opts.length > 0) {
          // 近くにプレイヤーがいてランダムで当たった場合だけ狙う
          const playerFighter = (playerIdx >= 0 && fighters[playerIdx] && fighters[playerIdx].alive && fighters[playerIdx] !== f)
            ? fighters[playerIdx] : null;
          const playerDist = playerFighter ? Math.hypot(playerFighter.x - f.x, playerFighter.y - f.y) : Infinity;
          if (playerFighter && playerDist < 160 && Math.random() < 0.5) {
            f._target = playerFighter;
            f._targetCd = 0.8 + Math.random() * 0.8;
          } else {
            f._target = (Math.random() < 0.55 && nearest) ? nearest : opts[Math.floor(Math.random() * opts.length)];
            f._targetCd = 1.0 + Math.random() * 1.8;
          }
        }
      }
      if (phase === 'battle' && f._target && f._target.alive) {
        const tgt = f._target;
        const tdist = Math.hypot(tgt.x - f.x, tgt.y - f.y);
        const tang = Math.atan2(tgt.y - f.y, tgt.x - f.x);
        const range = f.radius + tgt.radius + 6;
        if (tdist < range) {
          const side = (Math.sin(performance.now() * 0.0018 + f.id * 1.3) > 0) ? 1 : -1;
          f.vx += Math.cos(tang + Math.PI / 2) * side * 28 * dt;
          f.vy += Math.sin(tang + Math.PI / 2) * side * 28 * dt;
        } else {
          const sp = 82 + f.spd * 0.78;
          f.vx += Math.cos(tang) * sp * dt;
          f.vy += Math.sin(tang) * sp * dt;
        }
      }
    }

    // 攻撃チェック（プレイヤー・AI共通）
    if (phase === 'battle') {
      const inRange = alive.filter(o => o !== f && Math.hypot(o.x - f.x, o.y - f.y) < f.radius + o.radius + 8);
      if (inRange.length > 0) {
        f.atkTimer += dt;
        if (f.atkTimer >= f.atkCd) {
          f.atkTimer = 0;
          const atktgt = inRange[Math.floor(Math.random() * inRange.length)];
          const move = f.moves[Math.floor(Math.random() * f.moves.length)];
          const eff = calcEff(move.type, atktgt.types);
          const dmg = (move.power / 100) * (1 + f.atk / 120) * 5 * (1 - atktgt.def / 400) * (0.75 + Math.random() * .5) * eff;
          const actualDmg = Math.min(atktgt.hp, dmg);
          atktgt.hp = Math.max(0, atktgt.hp - dmg);
          f.damageDealt += actualDmg;
          atktgt.flash = 1; f.atkGlow = 1;
          spawnEffect(f, atktgt, move);
          spawnParticles(atktgt.x, atktgt.y, TC[move.type] || '#FFD700', eff >= 2 ? 8 : 4);
          playHit(move.type, eff);
          const effMark = eff >= 2 ? '!!' : eff === 0 ? '×' : '';
          floatingTexts.push({ text: move.name + effMark, x: f.x, y: f.y - 42, col: TC[move.type] || '#FFD700', life: 1.0 });
          const effLabel = eff >= 2 ? '★効果抜群！' : eff <= 0.5 && eff > 0 ? '▼いまひとつ' : eff === 0 ? '×無効！' : '';
          addCommentary(`${f.name}→${atktgt.name}`, `${move.name}${effLabel ? ' ' + effLabel : ''}`, TC[move.type] || '#DDD', false);
          if (atktgt.hp <= 0) {
            atktgt.alive = false;
            f.kills += 1;
            spawnParticles(atktgt.x, atktgt.y, atktgt.types ? TC[atktgt.types[0]] : '#FFF', 16);
            addCommentary(`💀 ${atktgt.name}`, '　が倒れた！', '#FF5555', true);
            playKO();
          }
        }
      } else {
        f.atkTimer = 0;
      }
    }

    // 移動（プレイヤー vs AI）
    if (isPlayer) {
      // プレイヤー操作
      const ms = 265 + f.spd * 1.0;
      if (KEYS['ArrowUp']    || KEYS['KeyW'] || DPAD_ACTIVE.up)    f.vy -= ms * dt;
      if (KEYS['ArrowDown']  || KEYS['KeyS'] || DPAD_ACTIVE.down)  f.vy += ms * dt;
      if (KEYS['ArrowLeft']  || KEYS['KeyA'] || DPAD_ACTIVE.left)  f.vx -= ms * dt;
      if (KEYS['ArrowRight'] || KEYS['KeyD'] || DPAD_ACTIVE.right) f.vx += ms * dt;
      f.vx *= 0.82; f.vy *= 0.82;
      const sp = Math.hypot(f.vx, f.vy), maxSp = ms * 0.75;
      if (sp > maxSp) { f.vx = f.vx / sp * maxSp; f.vy = f.vy / sp * maxSp; }
    } else {
      // AI移動
      const ws = phase === 'betting' ? 32 : 22;
      f.vx += Math.cos(f.wanderAng) * ws * dt;
      f.vy += Math.sin(f.wanderAng) * ws * dt;
      f.vx *= 0.91; f.vy *= 0.91;
      const spd = Math.hypot(f.vx, f.vy), ms = phase === 'betting' ? 65 : 138 + f.spd * 0.8;
      if (spd > ms) { f.vx = f.vx / spd * ms; f.vy = f.vy / spd * ms; }
    }

    f.x += f.vx * dt; f.y += f.vy * dt;
    keepInArena(f);
    fighters.forEach(o => {
      if (o === f || !o.alive) return;
      const dx = f.x - o.x, dy = f.y - o.y, dist = Math.hypot(dx, dy), mn = f.radius + o.radius;
      if (dist < mn && dist > .01) {
        const push = (mn - dist) / 2;
        f.x += dx / dist * push; f.y += dy / dist * push;
        o.x -= dx / dist * push; o.y -= dy / dist * push;
      }
    });
  });

  if (phase === 'battle') {
    if (fighters.filter(f => f.alive).length <= 1) phase = 'result';
  }
}

// =====================================================
// エフェクト描画
// =====================================================
function drawEffects() {
  activeEffects.forEach(e => {
    const p = Math.min(1, e.t / e.dur);
    ctx.save(); FX[e.type] && FX[e.type](ctx, e, p); ctx.restore();
  });
}
function gBeam(ctx, x1, y1, x2, y2, col, gCol, ow, iw) {
  [[ow, col + '55'], [iw, col], [iw * .35, '#FFFFFF']].forEach(([w, c]) => {
    ctx.lineWidth = w; ctx.strokeStyle = c;
    ctx.shadowColor = gCol; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });
}
function gBurst(ctx, x, y, p, col) {
  ctx.globalAlpha = (1 - p) * .75;
  ctx.beginPath(); ctx.arc(x, y, p * 38, 0, Math.PI * 2);
  ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.shadowColor = col; ctx.shadowBlur = 10; ctx.stroke();
  ctx.fillStyle = col + '33'; ctx.fill();
}
const FX = {

// =====================================================
// フィールド描画
// =====================================================
function drawArena() {
  const rx=ARX+6,ry=ARY+6,cut=.22;
  const pts=[[ACX-rx*(1-cut),ACY-ry],[ACX+rx*(1-cut),ACY-ry],[ACX+rx,ACY-ry*cut],[ACX+rx,ACY+ry*cut],[ACX+rx*(1-cut),ACY+ry],[ACX-rx*(1-cut),ACY+ry],[ACX-rx,ACY+ry*cut],[ACX-rx,ACY-ry*cut]];
  ctx.save();ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);pts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();
  const g=ctx.createRadialGradient(ACX,ACY,0,ACX,ACY,Math.max(rx,ry));g.addColorStop(0,'#DDD0A8');g.addColorStop(1,'#C4B48A');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#A89060';ctx.lineWidth=4;ctx.stroke();ctx.restore();
  const rx2=rx-9,ry2=ry-9,cut2=.22;
  const pts2=[[ACX-rx2*(1-cut2),ACY-ry2],[ACX+rx2*(1-cut2),ACY-ry2],[ACX+rx2,ACY-ry2*cut2],[ACX+rx2,ACY+ry2*cut2],[ACX+rx2*(1-cut2),ACY+ry2],[ACX-rx2*(1-cut2),ACY+ry2],[ACX-rx2,ACY+ry2*cut2],[ACX-rx2,ACY-ry2*cut2]];
  ctx.beginPath();ctx.moveTo(pts2[0][0],pts2[0][1]);pts2.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();ctx.strokeStyle='#B8A070';ctx.lineWidth=2;ctx.stroke();
}

// =====================================================
// ポケモン描画
// =====================================================
function drawFighters() {
  fighters.forEach(f => {
    if (f.deathT <= 0) return;
    const img = IMGS[f.file];
    const isPlayer = f.id === playerIdx;
    ctx.save();
    ctx.globalAlpha = f.alive ? 1 : Math.max(0, f.deathT);

    // プレイヤーポケモン: 輝くリング
    if (isPlayer && f.alive) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.005);
      ctx.globalAlpha = 0.55 + pulse * 0.4;
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 18 + pulse * 10;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.radius + 10, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = f.alive ? 1 : Math.max(0, f.deathT);
    }

    if (f.atkGlow > 0) {
      ctx.globalAlpha = f.atkGlow * .7;
      ctx.shadowColor = TC[f.types[0]] || '#FFD700'; ctx.shadowBlur = 22;
      ctx.strokeStyle = TC[f.types[0]] || '#FFD700'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.radius + 8, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = f.alive ? 1 : Math.max(0, f.deathT);
    }
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.ellipse(f.x, f.y + f.radius - 4, f.radius * .7, f.radius * .22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,.28)'; ctx.fill();
    const sc = f.alive ? f.scl : f.deathT;
    const sw = f.radius * 2.6, sh = f.radius * 2.6;
    ctx.translate(f.x, f.y); ctx.scale(sc, sc);
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.imageSmoothingEnabled = false;
      if (f.flash > 0) {
        ctx.globalAlpha = f.flash * .75; ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.ellipse(0, 0, sw / 2, sh / 2, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = f.alive ? 1 : Math.max(0, f.deathT);
      }
      ctx.drawImage(img, -sw / 2, -sh / 2, sw, sh);
    } else {
      ctx.beginPath(); ctx.arc(0, 0, f.radius, 0, Math.PI * 2);
      ctx.fillStyle = f.flash > 0 ? '#FFF' : TC[f.types[0]] || '#888'; ctx.fill();
    }
    if (betIdx === f.id && phase === 'betting') {
      ctx.scale(1 / sc, 1 / sc);
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
      ctx.setLineDash([7, 4]); ctx.lineDashOffset = -performance.now() * .06;
      ctx.beginPath(); ctx.arc(0, 0, f.radius + 9, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();

    // 名前タグ（バトル中）
    if (phase === 'battle' && f.alive) {
      ctx.save();
      if (isPlayer) {
        // プレイヤー：金色の「★あなた」
        ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
        ctx.fillText('★あなた', f.x, f.y - f.radius - 16);
      }
      ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillStyle = isPlayer ? '#FFD700' : '#FFF';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
      ctx.fillText(f.name, f.x, f.y - f.radius - (isPlayer ? 4 : 4));
      ctx.restore();
    }
  });
}

// =====================================================
// パーティクル描画
// =====================================================
function drawParticles() {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

// =====================================================
// 浮き文字描画
// =====================================================
function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.save(); ctx.globalAlpha = ft.life;
    ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = ft.col; ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
    ctx.fillText(ft.text, ft.x, ft.y - (1 - ft.life) * 22);
    ctx.restore();
  });
}

// =====================================================
// サイドパネル
// =====================================================
function drawPanels() {
  const panelH = isPortrait ? COMM_Y : H;
  // 左パネル背景
  ctx.fillStyle = '#181818';
  ctx.beginPath();
  if (!isPortrait) {
    ctx.moveTo(0, 0); ctx.lineTo(PW + 10, 0); ctx.lineTo(PW - 8, panelH); ctx.lineTo(0, panelH);
    ctx.closePath();
  } else {
    ctx.rect(0, 0, PW, panelH);
  }
  ctx.fill();
  // 右パネル背景
  ctx.fillRect(RP_X, 0, PW, panelH);
  ctx.strokeStyle = '#282828'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(RP_X, 0); ctx.lineTo(RP_X, panelH); ctx.stroke();

  const leftF = fighters.filter(f => f.side === 0);
  const rightF = fighters.filter(f => f.side === 1);
  if (isPortrait) {
    const entryH = Math.floor((COMM_Y - 8) / 3);
    leftF.forEach((f, i)  => drawEntryPortrait(f, 0,    4 + i * entryH, PW,  entryH - 3));
    rightF.forEach((f, i) => drawEntryPortrait(f, RP_X, 4 + i * entryH, PW,  entryH - 3));
  } else {
    const entryH = Math.floor((H - 20) / 3);
    leftF.forEach((f, i)  => drawEntry(f, 5,       10 + i * entryH, PW - 12, entryH - 5, 'left'));
    rightF.forEach((f, i) => drawEntry(f, RP_X + 3, 10 + i * entryH, PW - 10, entryH - 5, 'right'));
  }
}

// 縦持ちパネルエントリ（76px幅、コンパクト）
function drawEntryPortrait(f, x, y, w, h) {
  ctx.save();
  if (!f.alive) ctx.globalAlpha = .33;
  const isPlayer = f.id === playerIdx;
  if (betIdx === f.id) {
    ctx.fillStyle = isPlayer ? 'rgba(255,215,0,.22)' : 'rgba(255,215,0,.12)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5; ctx.strokeRect(x, y, w, h);
  }
  const img = IMGS[f.file];
  const sz = 38, imgX = x + (w - sz) / 2, imgY = y + 3;
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.imageSmoothingEnabled = false; ctx.drawImage(img, imgX, imgY, sz, sz);
  } else {
    ctx.fillStyle = TC[f.types[0]] || '#888';
    ctx.beginPath(); ctx.arc(imgX + sz/2, imgY + sz/2, sz/2, 0, Math.PI*2); ctx.fill();
  }
  ctx.font = '7px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = isPlayer ? '#FFD700' : '#AAFFAA';
  let nm = (isPlayer ? '★' : '') + f.name;
  while (nm.length > 1 && ctx.measureText(nm).width > w - 4) nm = nm.slice(0, -1);
  ctx.fillText(nm, x + w/2, y + sz + 5);
  const barX = x + 3, barY = y + h - 16, barW = w - 6, barH = 7;
  ctx.fillStyle = '#2a2a2a'; ctx.fillRect(barX, barY, barW, barH);
  const pct = Math.max(0, f.hp / f.maxHp);
  ctx.fillStyle = pct > .5 ? '#44CC44' : pct > .25 ? '#FFAA00' : '#CC2222';
  ctx.fillRect(barX, barY, barW * pct, barH);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
  ctx.restore();
}

// 横持ちパネルエントリ（従来）
function drawEntry(f, x, y, w, h, side) {
  ctx.save();
  if (!f.alive) ctx.globalAlpha = .33;
  const isPlayer = f.id === playerIdx;
  if (betIdx === f.id) {
    ctx.fillStyle = isPlayer ? 'rgba(255,215,0,.25)' : 'rgba(255,215,0,.15)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  }
  const img = IMGS[f.file];
  const thumbW = 44, thumbH = 44;
  const tx2 = side === 'left' ? x + 4 : x + w - thumbW - 4;
  const ty2 = y + 4;
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.imageSmoothingEnabled = false; ctx.drawImage(img, tx2, ty2, thumbW, thumbH);
  } else {
    ctx.fillStyle = TC[f.types[0]] || '#888';
    ctx.beginPath(); ctx.arc(tx2 + thumbW / 2, ty2 + thumbH / 2, thumbW / 2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.font = 'bold 10px Courier New'; ctx.textBaseline = 'top';
  const nameCol = isPlayer ? '#FFD700' : '#AAFFAA';
  if (side === 'left') {
    ctx.fillStyle = nameCol; ctx.textAlign = 'left';
    ctx.fillText((isPlayer ? '★' : '') + f.name, tx2 + thumbW + 4, y + 5);
  } else {
    ctx.fillStyle = nameCol; ctx.textAlign = 'right';
    ctx.fillText(f.name + (isPlayer ? '★' : ''), tx2 - 4, y + 5);
  }
  f.types.forEach((tp, i) => {
    const bw = 34, bh = 10;
    ctx.fillStyle = TC[tp] || '#888';
    if (side === 'left') { ctx.fillRect(tx2 + thumbW + 4 + (bw + 3) * i, y + 20, bw, bh); }
    else { ctx.fillRect(tx2 - 4 - (bw + 3) * (i + 1) + 1, y + 20, bw, bh); }
    ctx.font = '7px Courier New'; ctx.fillStyle = '#FFF'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const bx2 = side === 'left' ? tx2 + thumbW + 4 + (bw + 3) * i + bw / 2 : tx2 - 4 - (bw + 3) * i - bw / 2;
    ctx.fillText(tp.toUpperCase(), bx2, y + 25);
  });
  const barX = x + 4, barY = y + h - 36, barW = w - 8, barH = 10;
  ctx.fillStyle = '#2a2a2a'; ctx.fillRect(barX, barY, barW, barH);
  const pct = Math.max(0, f.hp / f.maxHp);
  ctx.fillStyle = pct > .5 ? '#44CC44' : pct > .25 ? '#FFAA00' : '#CC2222';
  ctx.fillRect(barX, barY, barW * pct, barH);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
  ctx.font = '8px Courier New'; ctx.fillStyle = '#bbb';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(Math.ceil(f.hp) + '/' + f.maxHp, barX + barW / 2, barY + 12);
  ctx.restore();
}

// =====================================================
// Dパッド描画
// =====================================================
function drawDpad() {
  if (phase !== 'battle') return;
  const pf = playerIdx >= 0 ? fighters[playerIdx] : null;

  // 縦持ち：Dパッドエリアの背景＋プレイヤー情報を常に描画
  if (isPortrait) {
    const areaY = COMM_Y + COMM_H;
    ctx.fillStyle = '#1a1a2a'; ctx.fillRect(0, areaY, W, H - areaY);
    if (pf) {
      ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = pf.alive ? '#FFD700' : '#FF6666';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
      ctx.fillText(pf.alive ? `🎮 ${pf.name} で操作中` : `💔 ${pf.name} が倒れた…観戦中`, W/2, areaY + 8);
      ctx.shadowBlur = 0;
      const bw2 = 220, bx2 = W/2 - 110, by2 = areaY + 28;
      ctx.fillStyle = '#2a2a2a'; ctx.fillRect(bx2, by2, bw2, 10);
      const pct2 = Math.max(0, pf.hp / pf.maxHp);
      ctx.fillStyle = pct2 > .5 ? '#44CC44' : pct2 > .25 ? '#FFAA00' : '#CC2222';
      ctx.fillRect(bx2, by2, bw2 * pct2, 10);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(bx2, by2, bw2, 10);
      ctx.font = '9px Courier New'; ctx.fillStyle = '#888'; ctx.textBaseline = 'top';
      ctx.fillText(`${Math.ceil(pf.hp)} / ${pf.maxHp} HP`, W/2, by2 + 12);
    }
    if (!pf || !pf.alive) return;
  } else {
    if (!pf || !pf.alive) return;
  }

  const dirs = [
    {key:'up',    label:'↑', dx:0,          dy:-DPAD_STEP},
    {key:'down',  label:'↓', dx:0,          dy: DPAD_STEP},
    {key:'left',  label:'←', dx:-DPAD_STEP, dy:0},
    {key:'right', label:'→', dx: DPAD_STEP, dy:0},
  ];
  ctx.save();
  ctx.globalAlpha = isPortrait ? 0.92 : 0.65;
  ctx.fillStyle = '#FFD700';
  ctx.font = (isPortrait ? 'bold 11px' : 'bold 9px') + ' Courier New';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
  ctx.fillText('タッチ操作', DPAD_CX, DPAD_CY - DPAD_STEP - DPAD_SZ / 2 - 6);
  dirs.forEach(d => {
    const r = DPAD_RECTS[d.key];
    const isActive = DPAD_ACTIVE[d.key] || KEYS['Arrow' + d.key.charAt(0).toUpperCase() + d.key.slice(1)] ||
      (d.key==='up'&&KEYS['KeyW']) || (d.key==='down'&&KEYS['KeyS']) ||
      (d.key==='left'&&KEYS['KeyA']) || (d.key==='right'&&KEYS['KeyD']);
    ctx.fillStyle = isActive ? 'rgba(255,215,0,0.88)' : 'rgba(30,30,60,0.82)';
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, isPortrait ? 12 : 7); ctx.fill();
    ctx.strokeStyle = isActive ? '#FFD700' : '#555'; ctx.lineWidth = isActive ? 2.5 : 1.5;
    ctx.stroke();
    ctx.fillStyle = isActive ? '#000' : '#FFF';
    ctx.font = (isPortrait ? 'bold 24px' : 'bold 18px') + ' Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.label, DPAD_CX + d.dx, DPAD_CY + d.dy);
  });
  ctx.restore();
}

// =====================================================
// 実況パネル
// =====================================================
function drawCommentary() {
  if (isPortrait) {
    // 縦持ち：横帯ストリップ
    const y0 = COMM_Y;
    ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, y0, W, COMM_H);
    ctx.strokeStyle = '#223'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
    ctx.fillStyle = '#111133'; ctx.fillRect(0, y0, W, 22);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#884400'; ctx.shadowBlur = 6;
    ctx.fillText('📺 実況', W/2, y0 + 11); ctx.shadowBlur = 0;
    ctx.strokeStyle = '#FFD70044'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(4, y0 + 22); ctx.lineTo(W - 4, y0 + 22); ctx.stroke();
    const eH = Math.floor((COMM_H - 24) / 3), maxEnt = 3;
    commentary.slice(0, maxEnt).forEach((entry, i) => {
      const ey = y0 + 24 + i * eH;
      const alpha = Math.max(0.15, 1 - (Date.now() - entry.ts) / 18000);
      ctx.save(); ctx.globalAlpha = alpha;
      if (entry.isKO) { ctx.fillStyle = 'rgba(255,50,50,0.1)'; ctx.fillRect(2, ey, W - 4, eH - 1); }
      ctx.fillStyle = entry.col; ctx.fillRect(3, ey + 2, 3, eH - 4);
      ctx.fillStyle = entry.isKO ? '#FF8888' : '#CCC';
      ctx.font = (entry.isKO ? 'bold ' : '') + '9px Courier New';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 2;
      let l1 = entry.line1;
      while (l1.length > 0 && ctx.measureText(l1).width > W - 50) l1 = l1.slice(0, -1);
      ctx.fillText(l1, 12, ey + 2);
      if (entry.line2) {
        ctx.fillStyle = entry.col; ctx.font = 'bold 9px Courier New';
        ctx.fillText(entry.line2, 12, ey + 13);
      }
      if (entry.isKO) { ctx.fillStyle = '#FF4444'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right'; ctx.fillText('KO!', W - 6, ey + 2); }
      ctx.restore();
    });
    if (commentary.length === 0) {
      ctx.fillStyle = '#555'; ctx.font = '10px Courier New';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('バトル開始待ち...', W/2, y0 + COMM_H/2);
    }
  } else {
    // 横持ち：右サイドパネル
    ctx.fillStyle = '#0a0a18'; ctx.fillRect(CP_X, 0, CW, H);
    ctx.strokeStyle = '#223'; ctx.lineWidth = 1; ctx.strokeRect(CP_X, 0, CW, H);
    ctx.fillStyle = '#111133'; ctx.fillRect(CP_X, 0, CW, 28);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#884400'; ctx.shadowBlur = 8;
    ctx.fillText('📺  実  況', CP_X + CW / 2, 14); ctx.shadowBlur = 0;
    ctx.strokeStyle = '#FFD70066'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(CP_X + 4, 28); ctx.lineTo(CP_X + CW - 4, 28); ctx.stroke();
    const entryH = 37, startY = 32;
    commentary.forEach((entry, i) => {
      const y = startY + i * entryH;
      if (y + entryH > H) return;
      const age = (Date.now() - entry.ts) / 1000;
      const alpha = Math.max(0.12, 1 - age / 22);
      ctx.save(); ctx.globalAlpha = alpha;
      if (entry.isKO) { ctx.fillStyle = 'rgba(255,50,50,0.12)'; ctx.fillRect(CP_X + 1, y, CW - 2, entryH - 2); }
      ctx.fillStyle = entry.col; ctx.fillRect(CP_X + 3, y + 2, 3, entryH - 5);
      ctx.fillStyle = entry.isKO ? '#FF8888' : '#CCC';
      ctx.font = (entry.isKO ? 'bold ' : '') + '9px Courier New';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
      let line1 = entry.line1;
      while (line1.length > 0 && ctx.measureText(line1).width > CW - 16) line1 = line1.slice(0, -1);
      ctx.fillText(line1, CP_X + 10, y + 3);
      if (entry.line2) {
        ctx.fillStyle = entry.col; ctx.font = 'bold 9px Courier New';
        let line2 = entry.line2;
        while (line2.length > 0 && ctx.measureText(line2).width > CW - 16) line2 = line2.slice(0, -1);
        ctx.fillText(line2, CP_X + 10, y + 16);
      }
      if (entry.isKO) { ctx.fillStyle = '#FF4444'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right'; ctx.fillText('KO!', CP_X + CW - 4, y + 3); }
      ctx.restore();
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(CP_X + 6, y + entryH - 1); ctx.lineTo(CP_X + CW - 6, y + entryH - 1); ctx.stroke();
    });
    if (phase !== 'battle' && commentary.length === 0) {
      ctx.fillStyle = '#555'; ctx.font = '10px Courier New';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('バトル開始待ち...', CP_X + CW / 2, H / 2);
    }
  }
}

// =====================================================
// リザルト画面
// =====================================================
function drawResultScreen() {
  ctx.fillStyle = 'rgba(0,0,0,.93)'; ctx.fillRect(0, 0, W, H);
  const cx = W / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = (isPortrait ? 'bold 20px' : 'bold 26px') + ' Courier New';
  ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#884400'; ctx.shadowBlur = 12;
  ctx.fillText('🏆  ランキング発表！  🏆', cx, isPortrait ? 32 : 38);
  ctx.shadowBlur = 0;

  const ranked = [...fighters].sort((a, b) => (b.kills*200+b.damageDealt) - (a.kills*200+a.damageDealt));
  const playerFighter = playerIdx >= 0 ? fighters[playerIdx] : null;
  const playerRank = playerFighter ? ranked.indexOf(playerFighter) + 1 : -1;
  const medals = ['🥇', '🥈', '🥉', '４', '５', '６'];
  const medalCols = ['#FFD700', '#CCCCCC', '#CD7F32', '#888', '#777', '#666'];

  const rowH = isPortrait ? 86 : 74;
  const startY = isPortrait ? 38 : 50;
  const rowW = isPortrait ? W - 10 : 500;
  const rowX = isPortrait ? 5 : cx - 250;

  ranked.forEach((f, rank) => {
    const y = startY + rank * rowH;
    const isPlayer = f === playerFighter;
    const isFirst = rank === 0;
    const score = Math.round(f.kills * 200 + f.damageDealt);
    ctx.fillStyle = isPlayer ? 'rgba(255,215,0,0.13)' : isFirst ? 'rgba(255,200,80,0.07)' :
                   rank%2===0 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.18)';
    ctx.fillRect(rowX, y+2, rowW, rowH-4);
    if (isPlayer) { ctx.strokeStyle='#FFD70055'; ctx.lineWidth=1.5; ctx.strokeRect(rowX, y+2, rowW, rowH-4); }

    // メダル
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=(isFirst ? 'bold 22px' : 'bold 16px')+' Courier New';
    ctx.fillStyle=medalCols[rank];
    ctx.shadowColor=isFirst?'#AA8800':'transparent'; ctx.shadowBlur=isFirst?6:0;
    ctx.fillText(medals[rank], rowX+22, y+rowH/2); ctx.shadowBlur=0;

    // スプライト
    const img = IMGS[f.file];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.save(); ctx.imageSmoothingEnabled=false;
      const sz = isFirst ? (isPortrait?72:62) : (isPortrait?62:52);
      ctx.drawImage(img, rowX+42, y+rowH/2-sz/2, sz, sz); ctx.restore();
    }

    // 名前
    const nameX = rowX + (isPortrait ? 112 : 118);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font=(isFirst?'bold 15px':isPlayer?'bold 13px':'13px')+' Courier New';
    ctx.fillStyle=isPlayer?'#FFD700':isFirst?'#FFF':'#CCC';
    ctx.fillText((isPlayer?'★ ':'')+f.name, nameX, y+26);

    // タイプバッジ
    f.types.forEach((tp, ti) => {
      const bx2=nameX+ti*56, by2=y+30;
      ctx.fillStyle=TC[tp]||'#888'; ctx.fillRect(bx2, by2, 50, 11);
      ctx.font='7px Courier New'; ctx.fillStyle='#FFF'; ctx.textBaseline='middle';
      ctx.fillText(tp.toUpperCase(), bx2+25, by2+5.5); ctx.textBaseline='alphabetic';
    });

    // 撃破・ダメージ
    ctx.font='10px Courier New'; ctx.fillStyle='#AAA';
    ctx.fillText('撃破 '+f.kills+'体 / ダメ '+Math.round(f.damageDealt), nameX, y+(isPortrait?58:60));

    // スコア
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.font=(isFirst?'bold 16px':'bold 13px')+' Courier New';
    ctx.fillStyle=isFirst?'#FFD700':'#AAA';
    ctx.fillText(score+'pt', rowX+rowW-8, y+rowH/2); ctx.textBaseline='alphabetic';

    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(rowX+8,y+rowH-2); ctx.lineTo(rowX+rowW-8,y+rowH-2); ctx.stroke();
  });

  const msgY = startY + ranked.length * rowH + 16;
  if (playerRank > 0) {
    const pMsg = playerRank===1 ? '🎉 '+(isPortrait?'優勝！おめでとう！':'あなたのポケモンが優勝！おめでとう！')+' 🎉' :
                 playerRank===2 ? '🥈 惜しい！２位！' : playerRank===3 ? '🥉 ３位！よく戦った！' :
                 '😢 '+playerRank+'位… また挑戦しよう！';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 14px Courier New';
    ctx.fillStyle=playerRank===1?'#FFD700':playerRank<=3?'#88FF88':'#FF8888';
    ctx.shadowColor='#000'; ctx.shadowBlur=6;
    ctx.fillText(pMsg, cx, msgY); ctx.shadowBlur=0;
  }

  const bx=cx-90, by=(playerRank>0?msgY:startY+ranked.length*rowH)+20, bw=180, bh=44;
  ctx.fillStyle='#CC1111'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(bx, by, bw, bh/3);
  ctx.font='bold 16px Courier New'; ctx.fillStyle='#FFF';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowBlur=0;
  ctx.fillText('▶  もう一度', cx, by+bh/2);
  c._replayBtn = { x: bx, y: by, w: bw, h: bh };
}

// =====================================================
// 読み込み画面
// =====================================================
function drawLoading() {
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 22px Courier New'; ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const dots = '。'.repeat(Math.floor(performance.now() / 400) % 4);
  ctx.fillText('読み込み中' + dots, W / 2, H / 2);
}

// =====================================================
// メインループ
// =====================================================
function loop(ts) {
  ctx.clearRect(0, 0, W, H);
  if (phase === 'loading') {
    drawLoading();
  } else {
    if (phase !== 'start') update(ts);
    // 縦持ち：アリーナ部分のみ砂色、残りは暗色
    if (isPortrait) {
      ctx.fillStyle = '#C8B88A'; ctx.fillRect(0, 0, W, COMM_Y);
      ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, COMM_Y, W, COMM_H);
      ctx.fillStyle = '#1a1a2a'; ctx.fillRect(0, COMM_Y + COMM_H, W, H - COMM_Y - COMM_H);
    } else {
      ctx.fillStyle = '#C8B88A'; ctx.fillRect(0, 0, W, H);
    }
    drawArena();
    drawParticles();
    drawEffects();
    drawFighters();
    drawFloatingTexts();
    drawPanels();
    drawCommentary();
    drawDpad();
    drawBanner();
    if (phase === 'betting') drawBettingHint();
    if (phase === 'battle' && playerIdx >= 0 && !isPortrait) {
      const pf = fighters[playerIdx];
      ctx.save();
      ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = pf && pf.alive ? '#FFD700' : '#FF6666';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
      ctx.fillText(
        pf && pf.alive ? `🎮 あなた: ${pf.name}  ―  矢印キー・WASD・Dパッドで操作`
                       : `💔 ${pf ? pf.name : ''}  が倒れた…観戦中`,
        ACX, 8
      );
      ctx.restore();
    }
    if (phase === 'start')   drawStartScreen();
    if (phase === 'result')  drawResultScreen();
  }
  requestAnimationFrame(loop);
}

// =====================================================
// 入力
// =====================================================
function getXY(e) {
  const rect = c.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}

function onClick(e) {
  initAudio();
  const {x: mx, y: my} = getXY(e);
  if (phase === 'start') {
    const b = c._startBtn;
    if (b && mx > b.x && mx < b.x + b.w && my > b.y && my < b.y + b.h) startGame();
  } else if (phase === 'betting') {
    let hit = false;
    fighters.forEach(f => {
      if (!f.alive) return;
      if (Math.hypot(mx - f.x, my - f.y) < f.radius + 14) { betIdx = f.id; hit = true; }
    });
    if (!hit) {
      if (isPortrait) {
        const entryH = Math.floor((COMM_Y - 8) / 3);
        fighters.filter(f => f.side === 0).forEach((f, i) => {
          const ey = 4 + i * entryH;
          if (mx >= 0 && mx < PW && my >= ey && my < ey + entryH - 3) betIdx = f.id;
        });
        fighters.filter(f => f.side === 1).forEach((f, i) => {
          const ey = 4 + i * entryH;
          if (mx >= RP_X && mx < RP_X + PW && my >= ey && my < ey + entryH - 3) betIdx = f.id;
        });
      } else {
        const entryH = Math.floor((H - 20) / 3);
        fighters.filter(f => f.side === 0).forEach((f, i) => {
          const ey = 10 + i * entryH;
          if (mx > 5 && mx < 5 + PW - 12 && my > ey && my < ey + entryH - 5) betIdx = f.id;
        });
        fighters.filter(f => f.side === 1).forEach((f, i) => {
          const ey = 10 + i * entryH;
          if (mx > RP_X + 3 && mx < RP_X + 3 + PW - 10 && my > ey && my < ey + entryH - 5) betIdx = f.id;
        });
      }
    }
  } else if (phase === 'result') {
    const b = c._replayBtn;
    if (b && mx > b.x && mx < b.x + b.w && my > b.y && my < b.y + b.h) resetGame();
  }
}

c.addEventListener('click', onClick);

// タッチ：Dパッド + ゲームクリック
c.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  updateDpadFromTouches(e);
  // DパッドボタンでなければゲームクリックとしてもOK
  const {x: mx, y: my} = getXY(e);
  if (!isDpadPos(mx, my)) onClick(e);
}, { passive: false });

c.addEventListener('touchmove', e => {
  e.preventDefault();
  updateDpadFromTouches(e);
}, { passive: false });

c.addEventListener('touchend', e => {
  e.preventDefault();
  updateDpadFromTouches(e); // 離したら対応するフラグが消える
}, { passive: false });

// =====================================================
// ゲームフロー
// =====================================================
function startGame() {
  initFighters();
  phase = 'betting'; countdown = 10; bannerTxt = 'ベット受付中...'; lastTs = 0;
  playStart();
  clearInterval(cdInt);
  cdInt = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(cdInt);
      playerIdx = betIdx; // 選んだポケモンを操作
      bannerTxt = 'スタート！';
      setTimeout(() => { bannerTxt = ''; phase = 'battle'; }, 900);
    } else if (countdown <= 3) {
      bannerTxt = countdown.toString();
    } else {
      bannerTxt = 'ベット受付中...';
    }
  }, 1000);
}

function resetGame() {
  clearInterval(cdInt);
  bannerTxt = ''; betIdx = -1; playerIdx = -1; phase = 'start';
  fighters = []; activeEffects = []; particles = []; floatingTexts = []; commentary = [];
  DPAD_ACTIVE.up = false; DPAD_ACTIVE.down = false;
  DPAD_ACTIVE.left = false; DPAD_ACTIVE.right = false;
}

// =====================================================
// 起動
// =====================================================
preloadImages(() => {
  phase = 'start';
  initFighters();
});
requestAnimationFrame(loop);
</script>
</body>
</html>
